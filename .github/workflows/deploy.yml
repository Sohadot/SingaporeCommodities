name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11.8"
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine build environment
        id: build_env
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "wrangler_branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "wrangler_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        run: |
          python -m scripts.build \
            --env "${{ steps.build_env.outputs.environment }}" \
            --version "${{ github.sha }}"

      - name: Validate dist
        run: |
          python -m scripts.validate_dist --strict --dist dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.build_env.outputs.environment }}
          path: dist/
          retention-days: 30

      - name: Check Cloudflare secrets
        id: check_secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" && -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "✅ Cloudflare secrets found — deployment will proceed."
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Cloudflare secrets not configured."
            echo "    To enable automatic deployment, add these secrets in GitHub:"
            echo "    Settings → Secrets and variables → Actions → New repository secret"
            echo "    • CLOUDFLARE_API_TOKEN  (from Cloudflare dashboard → API Tokens)"
            echo "    • CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard → right sidebar)"
          fi

      - name: Setup Node.js
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy to Cloudflare Pages
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=singapore-commodities
            --branch=${{ steps.build_env.outputs.wrangler_branch }}

      - name: Deployment summary
        run: |
          echo "========================================"
          echo "Build Summary"
          echo "========================================"
          echo "Environment : ${{ steps.build_env.outputs.environment }}"
          echo "Branch      : ${{ steps.build_env.outputs.wrangler_branch }}"
          echo "Commit      : ${{ github.sha }}"
          echo "Deployed    : ${{ steps.check_secrets.outputs.has_secrets }}"
          echo "========================================"
