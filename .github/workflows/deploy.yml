name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11.8"
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine build environment and branch
        id: build_env
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            # Sanitize branch name: replace / and _ with - for Cloudflare Pages compatibility
            RAW_BRANCH="${{ github.head_ref }}"
            SAFE_BRANCH="${RAW_BRANCH//\//-}"
            SAFE_BRANCH="${SAFE_BRANCH//_/-}"
            # Cloudflare Pages branch names max 63 chars
            SAFE_BRANCH="${SAFE_BRANCH:0:63}"
            echo "wrangler_branch=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "Branch sanitized: ${RAW_BRANCH} → ${SAFE_BRANCH}"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "wrangler_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        run: |
          python -m scripts.build \
            --env "${{ steps.build_env.outputs.environment }}" \
            --version "${{ github.sha }}"

      - name: Validate dist
        run: |
          python -m scripts.validate_dist --strict --dist dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.build_env.outputs.environment }}
          path: dist/
          retention-days: 30

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "→ Branch: ${{ steps.build_env.outputs.wrangler_branch }}"
          echo "→ Environment: ${{ steps.build_env.outputs.environment }}"
          echo "→ Dist contents:"
          ls dist/ | head -20
          npx wrangler@3 pages deploy dist \
            --project-name=singapore-commodities \
            --branch="${{ steps.build_env.outputs.wrangler_branch }}" \
            --commit-hash="${{ github.sha }}"

      - name: Deployment summary
        run: |
          echo "========================================"
          echo "Build Summary"
          echo "========================================"
          echo "Environment : ${{ steps.build_env.outputs.environment }}"
          echo "Branch      : ${{ steps.build_env.outputs.wrangler_branch }}"
          echo "Commit      : ${{ github.sha }}"
          echo "========================================"
