name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11.8"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine build environment
        id: build_env
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "wrangler_branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "wrangler_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        run: |
          python build.py \
            --env "${{ steps.build_env.outputs.environment }}" \
            --version "${{ github.sha }}"

      - name: Validate dist
        run: |
          python -m scripts.validate_dist --strict --dist dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.build_env.outputs.environment }}
          path: dist/
          retention-days: 30

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=singapore-commodities
            --branch=${{ steps.build_env.outputs.wrangler_branch }}

      - name: Deployment summary
        run: |
          echo "Environment: ${{ steps.build_env.outputs.environment }}"
          echo "Branch: ${{ steps.build_env.outputs.wrangler_branch }}"
          echo "Commit: ${{ github.sha }}"
