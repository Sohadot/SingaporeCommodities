<header class="site-header" role="banner">
  <div class="shell header-bar">
    <a class="brandmark" href="/" aria-label="{{ site.name }} home">
      {% if site.logo %}
      <img class="brandmark-image" src="{{ site.logo }}" alt="" width="36" height="36">
      {% endif %}
      <span class="brandmark-text">{{ site.name }}</span>
    </a>

    <button
      class="nav-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="main-nav"
      aria-label="Toggle navigation">
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
    </button>

    <nav id="main-nav" class="main-nav" aria-label="Primary">
      <ul class="nav-list">
        {% for item in navigation.main %}
        <li class="nav-item">
          <a
            href="{{ item.url }}"
            class="nav-link{% if page.url_path == item.url %} is-active{% elif item.url != '/' and page.url_path.startswith(item.url) %} is-active{% elif item.url == '/' and page.is_home %} is-active{% endif %}"
            {% if item.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
